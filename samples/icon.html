<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Glowing Input UI Icon</title>
    <meta name="viewport" content="width=512,initial-scale=1" />
    <style>
        :root {
            --bg-grad-start: #1f3552;
            --bg-grad-mid: #0f2238;
            --bg-grad-end: #081523;
            --panel-top: #24415f;
            --panel-mid: #172b42;
            --panel-bot: #122234;
            --bar-start: #aeb9c4;
            --bar-end: #8d98a4;
            --inactive-start: #6d7680;
            --inactive-end: #59616a;
            --border-glow: #7fd9ff;
            --accent: #9be4ff;
        }

        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, Arial, sans-serif;
        }

        .icon-container {
            display: flex;
            flex-direction: column;
            min-width: 0px;
            align-items: center;
            justify-content: center;
            gap: 10%;
        }

        .icon {
            position: relative;
            width: 512px;
            height: 512px;
            border-radius: 90px;
            overflow: hidden;
            font-size: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon__bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 40%, var(--bg-grad-start) 0%, var(--bg-grad-mid) 60%, var(--bg-grad-end) 100%);
        }

        .panel {
            width: 50%;
            height: 50%;
            border-radius: 50%;
            background: linear-gradient(var(--panel-top), var(--panel-mid) 60%, var(--panel-bot));
            gap: 10%;
            display: flex;
            flex-direction: column;
        }

        .input-wrap {
            width: 100%;
            height: 74px;
            border-radius: 20px;
            background: rgba(14, 33, 54, .55);
            border: 2px solid var(--border-glow);
            filter: drop-shadow(0 0 10px rgba(111, 214, 255, .35)) drop-shadow(0 0 22px rgba(10, 160, 255, .25));
            display: flex;
            align-items: center;
        }

        .input-bar {
            /* position: absolute; */
            left: 148px;
            top: 184px;
            width: 170px;
            height: 42px;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--bar-start), var(--bar-end));
            border: 1px solid #d9e8f2;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font: 500 34px/1 system-ui, Arial, sans-serif;
            color: #354556;
            text-transform: lowercase;
        }

        .input-bar::after {
            content: "text";
        }

        /* Check circle */
        .check {
            width: 48px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check::before {
            /* content: ""; */
            /* position: absolute; */
            /* left: 0; */
            /* top: 0; */
            /* right: 0; */
            /* bottom: 0; */
            /* margin: auto; */
            width: 38px;
            height: 38px;
            background: #0c2439;
            border: 2px solid var(--accent);
            border-radius: 50%;
        }

        .check::after {
            content: "";
            position: absolute;
            width: 26px;
            height: 14px;
            border: 4px solid var(--accent);
            border-top: none;
            border-right: none;
            transform: translateY(-2px) rotate(-45deg);
            border-radius: 3px;
        }

        /* List dropdown icon */
        .list-box {
            width: 48px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .list-box .box {
            position: relative;
            width: 34px;
            height: 34px;
            background: #0c2439;
            border: 2px solid var(--accent);
            border-radius: 8px;
        }

        .list-box .box span {
            position: absolute;
            left: 8px;
            right: 8px;
            height: 3px;
            background: var(--accent);
            border-radius: 3px;
        }

        .list-box .box span:nth-child(1) {
            top: 11px;
        }

        .list-box .box span:nth-child(2) {
            top: 17px;
        }

        .list-box .box span:nth-child(3) {
            top: 23px;
            width: 55%;
        }

        .list-box .box::after {
            content: "";
            position: absolute;
            right: 4px;
            bottom: 4px;
            width: 14px;
            height: 14px;
            border-left: 3px solid var(--accent);
            border-bottom: 3px solid var(--accent);
            transform: rotate(-45deg);
            border-radius: 2px;
        }

        /* Inactive bars */
        .inactive {
            width: 200px;
            height: 32px;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--inactive-start), var(--inactive-end));
            opacity: .55;
        }

        .inactive.one {
            top: 268px;
        }

        .inactive.two {
            top: 312px;
        }

        /* Bottom pill */
        .pill {
            width: 96px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--inactive-start), var(--inactive-end));
            opacity: .55;
            filter: drop-shadow(0 4px 22px rgba(10, 160, 255, .2)) drop-shadow(0 0 40px rgba(109, 214, 255, .1));
        }

        /* Accessibility helper (sr-only) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>

<body>
    <div class="icon-container">
        <span id="iconTitle" class="title"></span>
        <div class="icon" role="img" aria-labelledby="iconTitle">
            <span id="iconTitle" class="sr-only"></span>
            <div class="icon__bg"></div>
            <div class="panel">
                <div class="input-wrap">
                    <div class="input-bar"></div>
                    <div class="check"></div>
                    <div class="list-box">
                        <div class="box"><span></span><span></span><span></span></div>
                    </div>
                </div>
                <div class="dropdown-list">
                    <div class="inactive one"></div>
                    <div class="inactive two"></div>
                    <div class="pill"></div>
                </div>
            </div>
        </div>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const titleText = "Stylized glowing UI input panel with active text field, validation checkmark, list icon, and inactive bars."
            const titles = document.querySelectorAll("#iconTitle")
            titles.forEach(el => el.textContent = titleText)

            console.log(titles)
        });
    </script>
</body>

</html>
